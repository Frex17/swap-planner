<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swap Planner — Madcool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0F1E31; --night-2:#16293f;
    --paper:#F1F2EF; --card:#FFFFFF;
    --ink:#15212F; --muted:#6B7686; --line:#DCDFD9;
    --amber:#D99A2B; --amber-bg:#FBF3DF;
    --green:#1E9E6A; --green-bg:#E4F4EC;
    --red:#C24B43; --red-bg:#F9E9E7;
    --gray:#5B6675; --gray-bg:#ECEEF1;
    --early:#3D7BBF; --early-bg:#E7EFF8;
    --late:#7A58B5;  --late-bg:#EFE9F8;
    --clash:#C07A1C; --clash-bg:#FBF1DC;
    --accent:#0E8F8F; --accent-bg:#E2F1F1;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"IBM Plex Sans",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);-webkit-text-size-adjust:100%;line-height:1.45}
  .cond{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.04em}

  header.top{
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 4px),
      linear-gradient(165deg,var(--night),var(--night-2));
    color:#fff;padding:18px 16px 16px;border-bottom:3px solid var(--amber);
  }
  header.top .bar{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  header.top h1{margin:0;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;font-weight:700;font-size:24px;letter-spacing:.08em}
  header.top h1 .pl{color:var(--amber);margin-right:6px}
  .sync{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;letter-spacing:.05em;
    padding:4px 9px;border-radius:4px;display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.08);color:#AEBDCE;text-transform:uppercase}
  .sync .d{width:7px;height:7px;border-radius:50%;background:#7e8da0}
  .sync.online .d{background:#3ddc8e}
  .sync.online{color:#bfe9d4}
  #evLabel{margin:10px 0 0;font-family:"IBM Plex Mono",monospace;font-size:12.5px;font-weight:600;color:var(--amber);letter-spacing:.12em;text-transform:uppercase}

  .filters{position:sticky;top:0;z-index:20;background:var(--paper);padding:10px 12px 8px;border-bottom:1px solid var(--line)}
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1.5px solid var(--night);background:transparent;border-radius:6px;
    padding:5px 12px;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;
    font-size:13.5px;font-weight:600;letter-spacing:.05em;color:var(--night);cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--night);color:#fff}
  .chip.ev{border-color:var(--amber);color:#9a6f1f}
  .chip.ev.on{background:var(--amber);color:#fff}
  .chip.add{border-style:dashed;color:var(--muted);border-color:var(--muted)}
  .seg{display:flex;background:#E2E4DF;border-radius:7px;padding:3px;margin:8px 0}
  .seg button{flex:1;border:0;background:transparent;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;
    font-weight:700;font-size:14px;letter-spacing:.05em;padding:7px;border-radius:5px;color:var(--night);cursor:pointer}
  .seg button.on{background:#fff;box-shadow:0 1px 2px rgba(15,30,49,.15)}
  .seg-sm{display:inline-flex;background:#E2E4DF;border-radius:7px;padding:2px;margin-top:6px}
  .seg-sm button{border:0;background:transparent;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;
    font-weight:600;font-size:12.5px;letter-spacing:.05em;padding:5px 10px;border-radius:5px;color:var(--night);cursor:pointer}
  .seg-sm button.on{background:#fff;box-shadow:0 1px 2px rgba(15,30,49,.15)}

  .wrap{max-width:680px;margin:0 auto;padding:12px 12px 70px}

  .recap{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--green);border-radius:10px;margin:12px 0;padding:11px 14px}
  .rtitle{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.07em;
    font-weight:700;font-size:15px;color:var(--night);display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  .rcount{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted)}
  .ritem{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13.5px;padding:6px 0;border-top:1px dashed var(--line);flex-wrap:wrap}
  .ritem:first-of-type{border-top:0}
  .ritem.pend{background:var(--amber-bg);border-radius:7px;padding:7px 9px;border-top:0;margin:4px 0}
  .rwait{font-weight:700;color:#9a6f1f}
  .rswap{font-weight:700;color:var(--green)}
  .rmeta{font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--muted);white-space:nowrap}
  .rpill{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
  .rpill.al{background:var(--gray-bg);color:var(--gray)}
  .rpill.vto{background:var(--green-bg);color:var(--green)}
  .rpill.skip{background:#F0F1ED;color:#8a93a0}

  .day{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:14px 0;position:relative;box-shadow:0 1px 3px rgba(15,30,49,.06)}
  .dhead{padding:10px 16px 9px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px dashed var(--line)}
  .dhead .dt{font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;font-weight:700;font-size:19px;letter-spacing:.08em;color:var(--night)}
  .dhead .dt small{color:var(--muted);font-size:13px;margin-right:6px}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
  .tag.todo{background:var(--amber-bg);color:#9a6f1f}
  .tag.done{background:var(--green-bg);color:var(--green)}
  .day::before,.day::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;
    background:var(--paper);border:1px solid var(--line);top:38px}
  .day::before{left:-9px;border-left-color:transparent}
  .day::after{right:-9px;border-right-color:transparent}
  .dbody{padding:6px 16px 13px}
  .free{font-size:13px;color:var(--muted);padding:8px 0 3px}
  .worker{padding:12px 0;border-bottom:1px solid #EDEEE9}
  .worker:last-child{border-bottom:0}
  .whead{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .who{font-weight:700;font-size:15.5px}
  .pill{font-family:"IBM Plex Mono",monospace;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:4px;letter-spacing:.03em}
  .pill.early{background:var(--early-bg);color:var(--early)}
  .pill.late{background:var(--late-bg);color:var(--late)}
  .pill.warn{background:#F0F1ED;color:#8a93a0}
  .pill.pendp{background:var(--amber-bg);color:#9a6f1f}

  .pool{border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin:7px 0;background:#FBFBF9}
  .pool.shared{border-color:#E7C788;background:var(--clash-bg)}
  .pool.ptpool{border-color:#BFDCDC;background:var(--accent-bg)}
  .ptop{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .rbadge{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:11px;background:var(--night);color:#fff;border-radius:4px;padding:2px 8px;letter-spacing:.05em}
  .rbadge.shared{background:var(--clash)}
  .rbadge.ptb{background:var(--accent)}
  .ptag{font-family:"Barlow Condensed",sans-serif;font-size:11.5px;font-weight:700;color:var(--clash);text-transform:uppercase;letter-spacing:.08em}
  .ptag.t{color:var(--accent)}

  .cand{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;border-top:1px solid #EFF0EB;flex-wrap:wrap}
  .cand:first-of-type{border-top:0}
  .cname{font-size:13.5px;font-weight:600}
  .cname .role{font-family:"IBM Plex Mono",monospace;font-size:9.5px;font-weight:500;color:#98A1AD;margin-left:5px;letter-spacing:.02em}
  .cact{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .mini{border:0;cursor:pointer;font-weight:700;font-size:12px;border-radius:6px;padding:6px 10px;line-height:1;font-family:"IBM Plex Sans",sans-serif}
  .mini.ok{background:var(--green-bg);color:var(--green)}
  .mini.no{background:var(--red-bg);color:var(--red)}
  .mini.pend{background:var(--amber-bg);color:#9a6f1f}
  .mini.undo{background:var(--gray-bg);color:var(--night)}
  .mini.alx{background:var(--gray-bg);color:var(--gray)}
  .mini.vtox{background:var(--green-bg);color:var(--green)}
  .mini.skipx{background:#F0F1ED;color:#8a93a0}
  .cand.resolved .cname{color:#A0A8B2}
  .cand.resolved.declined .cname{text-decoration:line-through}
  .cand.locked .cname{color:#A8B0BA}
  .state{font-family:"IBM Plex Mono",monospace;font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:4px;letter-spacing:.02em}
  .state.secured{background:var(--green-bg);color:var(--green)}
  .state.declined{background:#F0F1ED;color:#8a93a0}
  .state.lock{background:#F0F1ED;color:#8a93a0}
  .nonecand{font-size:12.5px;color:var(--muted);padding:4px 0}
  .cover{font-size:12px;color:var(--muted);margin-top:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .clashnote{margin:9px 0 0;font-size:12.5px;color:#8e5d12;font-weight:600;background:var(--clash-bg);border:1px dashed #E0BE7C;border-radius:8px;padding:8px 11px}

  .legendrow{display:flex;gap:14px;flex-wrap:wrap;font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--muted);margin:12px 4px 0;text-transform:uppercase;letter-spacing:.03em}
  .legendrow .dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:14px 0}
  details.panel>summary{cursor:pointer;list-style:none;padding:12px 16px;
    font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.07em;
    font-weight:700;font-size:15px;color:var(--night);display:flex;justify-content:space-between;align-items:center}
  details.panel>summary::-webkit-details-marker{display:none}
  details.panel>summary::after{content:"▾";color:var(--muted)}
  details.panel[open]>summary::after{content:"▴"}
  .pcont{padding:0 16px 16px}
  label.fld{display:block;font-family:"IBM Plex Mono",monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin:12px 0 4px}
  input[type=text],input[type=date],input[type=number]{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:"IBM Plex Sans",sans-serif;color:var(--ink);background:#fff}
  input:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:transparent}
  .row{display:flex;gap:9px;flex-wrap:wrap}.row>*{flex:1 1 120px}
  .btn{border:0;cursor:pointer;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding:9px 14px;border-radius:8px;font-size:14px}
  .btn-ghost{background:var(--gray-bg);color:var(--night)}
  .btn-danger{background:var(--red-bg);color:var(--red)}
  .frow{display:flex;gap:7px;align-items:center;margin:7px 0}
  .frow .c{flex:0 0 90px}.frow .c input{font-family:"IBM Plex Mono",monospace;font-size:13px;text-transform:uppercase}
  .frow .n{flex:1}.frow .r{flex:0 0 56px}
  .hint{font-size:12px;color:var(--muted);margin:8px 0 0}
  .calibrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px}
  .read{font-family:"IBM Plex Mono",monospace;font-size:12px;background:#F6F7F4;border:1px solid var(--line);border-radius:7px;padding:8px 11px}
  table.swap{width:100%;border-collapse:collapse;margin-top:8px;font-family:"IBM Plex Mono",monospace;font-size:11px}
  table.swap th,table.swap td{border:1px solid var(--line);padding:4px;text-align:center}
  table.swap th{background:#F2F3EF;font-family:"Barlow Condensed",sans-serif;text-transform:uppercase;font-size:12.5px;letter-spacing:.05em}
  .swap td.r{background:#F8F9F6;font-weight:600}
  @media (prefers-reduced-motion: no-preference){
    .day{transition:box-shadow .15s ease}
    .day:hover{box-shadow:0 3px 10px rgba(15,30,49,.1)}
  }
</style>
</head>
<body>
<header class="top">
  <div class="bar">
    <h1><span class="pl">✈</span>Swap Planner</h1>
    <span class="sync" id="sync"><span class="d"></span><span id="syncTxt">offline</span></span>
  </div>
  <p id="evLabel">—</p>
</header>

<div class="filters">
  <div class="chips" id="eventChips"></div>
  <div class="seg">
    <button data-view="day" class="on">Per giorno</button>
    <button data-view="person">Per persona</button>
  </div>
  <div class="chips" id="personChips"></div>
  <div class="chips" id="dayChips" style="margin-top:6px"></div>
  <div class="seg-sm" id="candSeg">
    <button data-c="active">Attivi</button>
    <button data-c="all">+ Esclusi</button>
    <button data-c="only">Solo esclusi</button>
  </div>
</div>

<div class="wrap">
  <div id="recap" class="recap" style="display:none"></div>
  <div id="plan"></div>

  <div class="legendrow">
    <span><i class="dot" style="background:var(--amber-bg);border:1px solid #E7CF96"></i>⏳ attesa</span>
    <span><i class="dot" style="background:var(--green-bg)"></i>✓ approved · VTO</span>
    <span><i class="dot" style="background:var(--red-bg)"></i>✕ no</span>
    <span><i class="dot" style="background:var(--gray-bg)"></i>A/L</span>
    <span><i class="dot" style="background:var(--accent-bg);border:1px solid #BFDCDC"></i>PT part-time</span>
  </div>

  <details class="panel">
    <summary>Impostazioni</summary>
    <div class="pcont">
      <label class="fld">Nome evento</label>
      <input type="text" id="evName">
      <div class="row" style="margin-top:6px">
        <div><label class="fld">Dal</label><input type="date" id="evStart"></div>
        <div><label class="fld">Al</label><input type="date" id="evEnd"></div>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn btn-ghost" id="addEvent">+ Nuovo evento</button>
        <button class="btn btn-ghost" id="clearEvent">Azzera scelte</button>
        <button class="btn btn-danger" id="delEvent">Elimina evento</button>
      </div>

      <label class="fld" style="margin-top:16px">Persone del gruppo</label>
      <div id="friends"></div>
      <button class="btn btn-ghost" id="addFriend" style="margin-top:6px">+ Aggiungi persona</button>

      <label class="fld" style="margin-top:16px">Calibrazione Early/Late</label>
      <div class="calibrow">
        <div class="read" id="calibRead">—</div>
        <button class="btn btn-ghost" id="flipParity">Inverti</button>
      </div>
      <p class="hint">✓ Confermato: 6–10 luglio 2026, roster 7 = Early. Verificato anche: 19 giugno = 1° late del roster 14 (Valerio).</p>
    </div>
  </details>

  <details class="panel">
    <summary>Swap Table</summary>
    <div class="pcont"><div id="swapTables"></div></div>
  </details>
</div>

<script>
/* ====== SUPABASE (configurato) ====== */
const SUPABASE_URL = "https://sdksosnjtzkdgolntfrp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNka3Nvc25qdHprZGdvbG50ZnJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDU3MzQsImV4cCI6MjA5Njc4MTczNH0.BT-cI3Obd5TeBa5xN5ckrsC5xIm1MtMphXQABTiWVc8";

/* ---------- roster -> persone [nome, ruolo, flag?]
   flag: "soloE"/"soloL" = full-time ma fa solo earlies/lates
         "ptE"/"ptL"     = part-time: lavora solo il blocco early/late del suo roster, poi 11 off
   Coppie PT: Bruno(R6,E)+Valerio(R14,L) · Vanessa(R4,E)+Fabio(R12,L) · Cecilia(R14,E)+Gaia(R14,L) ---------- */
const ROSTER_PEOPLE = {
  1:[["Rodolfo","N1"],["Giuen","Juadhoc"],["Valentina M.","Jupu"],["Corinne","Ju"]],
  2:[["Annalisa","N1"],["Vito Regina","Ju"],["Ivano","Ju"],["Federica Natilla","Ju"]],
  3:[["Donnie","N1"],["Federica Greco","N1"],["Giorgia Bello","Jupu"],["Mariachiara","Juadhoc"],["Viviana","Ju"],["Nicolò","Ju"],["Emanuela","Ju"]],
  4:[["Pasquali","N1"],["Marygrace","N1"],["Pamela Martiradonna","Jupu"],["Sidney","Ju"],["Vanessa","Ju","ptE"]],
  5:[["Tino","N1"],["Walter","Jupu"],["Albana","Juadhoc"],["Dinale","Jupu"]],
  6:[["Giovanna Fiore","N1"],["Fusco","N1"],["Bruno","Jupu","ptE"],["Ida","Jupu"],["Shana","Ju"]],
  7:[["Alessandra","N1"],["Francesco S.","Jupu","soloL"],["Michela","Ju"],["Maria Rosaria","Ju"]],
  8:[["Beppe","N1"],["Debora","Jupu"],["Giorgia Giuliano","Ju"],["Daniela M.","Ju"]],
  9:[["Antonella Buono","N1"],["Alessandro Trizio","Jupu"],["Mariagrazia","Ju"]],
  10:[["Ressa","N1"],["Zingarelli","Jupu"],["Luca","Ju"],["Martina","Ju"]],
  11:[["Franco","N1"],["Valeria","Jupu"],["Pamela Cirasola","Ju"],["Francesca Kiptiu","Ju"]],
  12:[["Gianni","N1"],["Francesca","Jupu"],["Angela","Jupu"],["Andrea Olivo","Ju"],["Fabio","Ju","ptL"]],
  13:[["Vito Attolico","N1"],["Filippo","Jupu"],["Andrea Menta","Jupu"],["Ximena","Ju"],["Michele Sciacqua","Ju"]],
  14:[["Pierangelo","N1"],["Salvatore","N1"],["Cecilia","Juadhoc","ptE"],["Gaia","Jupu","ptL"],["Valerio","Jupu","ptL"],["Marianna D'Agostino","Ju"],["Maria Ricci","Ju"]],
  15:[["Roberto Volpe","N1"],["Tommaso","Jupu"],["Clara","Jupu","soloE"],["Gaetano","Ju"],["Gabriele","Ju"]],
  16:[["Arnesano","N1"],["Annalinda","N1"],["Margherita","Jupu"],["Marianna Annese","Ju"],["Luciana","Ju"]]
};

/* nomi-roster che corrispondono a voi 4 */
const CREW_ALIAS = {SALIFR:"Francesco S.", AVILXI:"Ximena", NUZZMA:"Martina", RUSANG:"Angela"};

const ANCHOR_DATE="2026-07-06", ANCHOR_ROSTER=7;

const DEFAULT_FRIENDS=[
  {code:"SALIFR",name:"Francesco",roster:7},
  {code:"AVILXI",name:"Ximena",roster:13},
  {code:"NUZZMA",name:"Martina",roster:10},
  {code:"RUSANG",name:"Angela",roster:12}
];
const FIRST_EVENT={id:"2026-07-08_2026-07-12",name:"Madcool",start:"2026-07-08",end:"2026-07-12"};

let state={
  events:[Object.assign({},FIRST_EVENT)],
  cur:FIRST_EVENT.id,
  friends:JSON.parse(JSON.stringify(DEFAULT_FRIENDS)),
  parityEarly:true,
  ui:{view:"day",person:"all",day:"all",cand:"active"}
};
let decisions={}; // "roster|name|day" -> {status:'pending'|'secured'|'declined', by, day}
let leaves={};    // "fid|day" -> "AL"|"VTO"|"SKIP"

const SKEY="swapplanner.v7";
function ev(){return state.events.find(e=>e.id===state.cur)||state.events[0];}
function fid(f){return f.code||f.name||("R"+f.roster);}
function dKey(r,name,day){return r+"|"+name+"|"+day;}
function parseDKey(k){const i=k.indexOf("|"),j=k.lastIndexOf("|");return{roster:+k.slice(0,i),name:k.slice(i+1,j),day:k.slice(j+1)};}
function saveState(){try{localStorage.setItem(SKEY,JSON.stringify(state));}catch(e){}}
function loadState(){
  try{
    const s=localStorage.getItem(SKEY);
    if(s)state=Object.assign(state,JSON.parse(s));
    if(!state.events||!state.events.length){state.events=[Object.assign({},FIRST_EVENT)];state.cur=FIRST_EVENT.id;}
    if(!state.events.some(e=>e.id===state.cur))state.cur=state.events[0].id;
  }catch(e){}
}
function decKeyStore(){return "swapplanner.dec7."+state.cur;}
function saveDec(){try{localStorage.setItem(decKeyStore(),JSON.stringify({decisions,leaves}));}catch(e){}}
function loadDec(){decisions={};leaves={};try{const s=localStorage.getItem(decKeyStore());if(s){const o=JSON.parse(s);decisions=o.decisions||{};leaves=o.leaves||{};}}catch(e){}}

/* ---------- engine ---------- */
function mod(n,m){return((n%m)+m)%m;}
function norm16(n){return mod(n-1,16)+1;}
function toUTC(d){const[a,b,c]=d.split("-").map(Number);return Date.UTC(a,b-1,c);}
function daysBetween(a,b){return Math.round((toUTC(b)-toUTC(a))/864e5);}
function addDays(d,n){const t=new Date(toUTC(d)+n*864e5);const p=x=>String(x).padStart(2,"0");return t.getUTCFullYear()+"-"+p(t.getUTCMonth()+1)+"-"+p(t.getUTCDate());}
const MM=["GEN","FEB","MAR","APR","MAG","GIU","LUG","AGO","SET","OTT","NOV","DIC"];
const WD=["DOM","LUN","MAR","MER","GIO","VEN","SAB"];
function pretty(d){const[a,b,c]=d.split("-").map(Number);return String(c).padStart(2,"0")+" "+MM[b-1];}
function weekday(d){return WD[new Date(toUTC(d)).getUTCDay()];}

function phaseOf(r,d){return mod((state.parityEarly?0:8)+daysBetween(ANCHOR_DATE,d)-(r-ANCHOR_ROSTER),16);}
function statusOf(p){
  if(p<=4)return{type:"early",day:p+1};
  if(p<=7)return{type:"off",offType:"eoff"};
  if(p<=12)return{type:"late",day:p-7};
  return{type:"off",offType:"loff"};
}
function statusFor(f,d){
  const lv=leaves[fid(f)+"|"+d];
  if(lv)return{type:"leave",kind:lv};
  return statusOf(phaseOf(f.roster,d));
}
function partnersFor(r,st){
  let a;
  if(st.type==="early")a=r+8+st.day;
  else if(st.type==="late")a=r+st.day;
  else return [];
  return [norm16(a),norm16(a+2)];
}
function isWork(st){return st.type==="early"||st.type==="late";}
function groupNames(){
  const s=new Set();
  state.friends.forEach(f=>{
    if(f.name)s.add(f.name);
    if(f.code&&CREW_ALIAS[f.code])s.add(CREW_ALIAS[f.code]);
  });
  return s;
}
/* chi fa solo earlies (full-time, roster R) copre anche il ciclo di norm16(R+8) per i turni early */
function extraEarlies(partnerRoster){
  const srcR=norm16(partnerRoster+8);
  return (ROSTER_PEOPLE[srcR]||[]).filter(p=>p[2]==="soloE").map(p=>({srcRoster:srcR,name:p[0],role:p[1],flag:p[2]}));
}
/* PT: lavora solo il suo blocco (early: fasi 0-4, late: fasi 8-12), 11 off.
   Può coprire qualsiasi tipo di turno. Regola rest (~2,5 giorni ≈ 60h), a giorni:
   disponibile in tutti gli off TRANNE il 2° giorno dopo la fine del blocco
   e il 2° giorno prima dell'inizio del successivo. */
function ptAvailable(roster,flag,day){
  const p=phaseOf(roster,day);
  if(flag==="ptE"&&p<=4)return false;            // sta lavorando il suo blocco early
  if(flag==="ptL"&&p>=8&&p<=12)return false;     // sta lavorando il suo blocco late
  const k=mod(p-(flag==="ptE"?4:12),16);         // giorni dalla fine del blocco (1..11)
  return k!==2&&k!==10;
}
function ptCandidates(dutyType,day){
  const grp=groupNames(),out=[];
  Object.keys(ROSTER_PEOPLE).forEach(rs=>{
    const r=+rs;
    ROSTER_PEOPLE[r].forEach(p=>{
      const fl=p[2];
      if(fl!=="ptE"&&fl!=="ptL")return;
      if(!ptAvailable(r,fl,day))return;
      const lock=grp.has(p[0])?"group":null;
      out.push({roster:r,name:p[0],role:p[1],pt:fl,lock,dec:lock?null:(decisions[dKey(r,p[0],day)]||null)});
    });
  });
  out.sort((a,b)=>(a.lock?1:0)-(b.lock?1:0));
  return out;
}
/* candidati di un pool roster: niente N1, niente PT (hanno il pool dedicato);
   membri del gruppo e soloL visibili ma bloccati */
function candidates(friend,partners,dutyType,day){
  const grp=groupNames();
  const out=[];
  function push(r,name,role,flag,srcRoster){
    if(out.some(o=>o.name===name))return;
    let lock=null;
    if(grp.has(name))lock="group";
    else if(flag==="soloL")lock="soloL";
    out.push({roster:r,name,role,srcRoster,soloE:flag==="soloE"&&!!srcRoster,lock,dec:lock?null:(decisions[dKey(r,name,day)]||null)});
  }
  partners.forEach(r=>{
    (ROSTER_PEOPLE[r]||[]).forEach(p=>{
      if(p[1]==="N1")return;
      if(p[2]==="ptE"||p[2]==="ptL")return;
      push(r,p[0],p[1],p[2]);
    });
    if(dutyType==="early")extraEarlies(r).forEach(x=>push(r,x.name,x.role,x.flag,x.srcRoster));
  });
  out.sort((a,b)=>(a.lock?1:0)-(b.lock?1:0));
  return out;
}
function availableCount(friend,partners,dutyType,day){
  return candidates(friend,partners,dutyType,day).filter(c=>!c.lock&&!c.dec).length
       + ptCandidates(dutyType,day).filter(c=>!c.lock&&!c.dec).length;
}
function securedSwapFor(fname,day){
  for(const k in decisions){const v=decisions[k];if(v.status==="secured"&&v.by===fname&&v.day===day){const pk=parseDKey(k);return{roster:pk.roster,name:pk.name};}}
  return null;
}
function pendingSwapsFor(fname,day){
  const out=[];
  for(const k in decisions){const v=decisions[k];if(v.status==="pending"&&v.by===fname&&v.day===day){const pk=parseDKey(k);out.push({roster:pk.roster,name:pk.name});}}
  return out;
}

function eventDays(){
  const e=ev();
  const out=[],n=daysBetween(e.start,e.end);
  if(isNaN(n)||n<0)return out;
  for(let i=0;i<=Math.min(n,60);i++)out.push(addDays(e.start,i));
  return out;
}
function workersOn(d){
  const w=[];
  state.friends.forEach((f,idx)=>{
    if(!f.roster)return;
    const st=statusFor(f,d);
    w.push({f,idx,st,partners:isWork(st)?partnersFor(f.roster,st):[]});
  });
  return w;
}
function sharedRosters(d){
  const c={};
  workersOn(d).filter(w=>isWork(w.st)&&!securedSwapFor(w.f.name,d)).forEach(w=>w.partners.forEach(r=>c[r]=(c[r]||0)+1));
  return new Set(Object.keys(c).filter(r=>c[r]>1).map(Number));
}

/* ---------- decisioni / coperture ---------- */
function setDecision(r,name,day,d){const k=dKey(r,name,day);if(d)decisions[k]=d;else delete decisions[k];saveDec();pushDecision(r,name,day,d);renderPlan();}
function setLeave(f,day,kind){const k=fid(f)+"|"+day;if(kind)leaves[k]=kind;else delete leaves[k];saveDec();pushLeave(f,day,kind);renderPlan();}

/* ---------- supabase ---------- */
let sb=null,sbReady=false,channel=null;
function setSync(on){const el=document.getElementById("sync");el.classList.toggle("online",on);document.getElementById("syncTxt").textContent=on?"sync":"offline";}
function applyRow(r){
  if(r.status==="AL"||r.status==="VTO"||r.status==="SKIP")leaves[r.person+"|"+r.day]=r.status;
  else if(r.day)decisions[dKey(r.roster,r.person,r.day)]={status:r.status,by:r.by_name,day:r.day};
}
function removeById(id){
  const rest=id.slice(state.cur.length+1);
  const p=rest.split("|");
  if(p[0]==="L"){delete leaves[p.slice(1,-1).join("|")+"|"+p[p.length-1]];return;}
  if(p.length>=3){
    const roster=p[0],day=p[p.length-1],name=p.slice(1,-1).join("|");
    delete decisions[roster+"|"+name+"|"+day];
  }else if(p.length===2){ /* id legacy senza giorno: togli tutte le voci di quella persona */
    const pre=p[0]+"|"+p[1]+"|";
    Object.keys(decisions).forEach(k=>{if(k.indexOf(pre)===0)delete decisions[k];});
  }
}
async function connectEvent(){
  if(!sb)return;
  if(channel){try{await sb.removeChannel(channel);}catch(e){}}
  const{data}=await sb.from("swap_decisions").select("*").eq("event",state.cur);
  (data||[]).forEach(applyRow);
  saveDec();
  channel=sb.channel("swap_"+state.cur)
    .on("postgres_changes",{event:"*",schema:"public",table:"swap_decisions"},payload=>{
      if(payload.eventType==="DELETE"){const id=payload.old&&payload.old.id;if(!id||id.indexOf(state.cur+"|")!==0)return;removeById(id);}
      else{const r=payload.new;if(!r||r.event!==state.cur)return;applyRow(r);}
      saveDec();renderPlan();
    }).subscribe();
  renderPlan();
}
async function initSupabase(){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY)return;
  try{
    const m=await import("https://esm.sh/@supabase/supabase-js@2");
    sb=m.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    sbReady=true;setSync(true);
    await connectEvent();
  }catch(e){console.warn("Supabase non attivo:",e);setSync(false);}
}
async function pushDecision(r,name,day,d){
  if(!sbReady)return;
  try{
    const id=state.cur+"|"+r+"|"+name+"|"+day;
    const legacy=state.cur+"|"+r+"|"+name;
    if(d)await sb.from("swap_decisions").upsert({id,event:state.cur,roster:r,person:name,status:d.status,by_name:d.by||null,day,updated_at:new Date().toISOString()});
    else await sb.from("swap_decisions").delete().in("id",[id,legacy]);
  }catch(e){console.warn(e);}
}
async function pushLeave(f,day,kind){
  if(!sbReady)return;
  try{const id=state.cur+"|L|"+fid(f)+"|"+day;
    if(kind)await sb.from("swap_decisions").upsert({id,event:state.cur,roster:f.roster||0,person:fid(f),status:kind,by_name:f.name||null,day,updated_at:new Date().toISOString()});
    else await sb.from("swap_decisions").delete().eq("id",id);
  }catch(e){console.warn(e);}
}
async function clearEventRemote(){
  if(!sbReady)return;
  try{await sb.from("swap_decisions").delete().eq("event",state.cur);}catch(e){console.warn(e);}
}

/* ---------- filtri ---------- */
function renderFilters(){
  const ec=document.getElementById("eventChips");
  ec.innerHTML=state.events.map(e=>`<button class="chip ev ${e.id===state.cur?'on':''}" data-e="${e.id}">${e.name||'(senza nome)'}</button>`).join("")+
    `<button class="chip add" data-e="__add">＋ evento</button>`;
  ec.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    if(c.dataset.e==="__add"){addNewEvent();return;}
    switchEvent(c.dataset.e);
  });

  const pc=document.getElementById("personChips");
  pc.innerHTML=`<button class="chip ${state.ui.person==='all'?'on':''}" data-p="all">Tutti</button>`+
    state.friends.map((f,i)=>`<button class="chip ${state.ui.person==i?'on':''}" data-p="${i}">${f.name||f.code}</button>`).join("");
  pc.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{state.ui.person=c.dataset.p==="all"?"all":+c.dataset.p;saveState();renderFilters();renderPlan();});

  const dc=document.getElementById("dayChips");
  dc.innerHTML=`<button class="chip ${state.ui.day==='all'?'on':''}" data-d="all">Tutti</button>`+
    eventDays().map(d=>`<button class="chip ${state.ui.day===d?'on':''}" data-d="${d}">${pretty(d)}</button>`).join("");
  dc.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{state.ui.day=c.dataset.d;saveState();renderFilters();renderPlan();});

  document.querySelectorAll(".seg button").forEach(b=>{
    b.classList.toggle("on",b.dataset.view===state.ui.view);
    b.onclick=()=>{state.ui.view=b.dataset.view;saveState();renderFilters();renderPlan();};
  });
  document.querySelectorAll("#candSeg button").forEach(b=>{
    b.classList.toggle("on",b.dataset.c===state.ui.cand);
    b.onclick=()=>{state.ui.cand=b.dataset.c;saveState();renderFilters();renderPlan();};
  });
}

/* ---------- eventi ---------- */
function switchEvent(id){
  if(!state.events.some(e=>e.id===id))return;
  state.cur=id;state.ui.day="all";saveState();loadDec();
  fillEventInputs();renderFilters();renderPlan();renderCalib();
  if(sbReady)connectEvent();
}
function addNewEvent(){
  const today=new Date(),p=x=>String(x).padStart(2,"0");
  const t=today.getFullYear()+"-"+p(today.getMonth()+1)+"-"+p(today.getDate());
  const e={id:"ev_"+Date.now(),name:"Nuovo evento",start:t,end:addDays(t,4)};
  state.events.push(e);switchEvent(e.id);
  const set=document.querySelector("details.panel");if(set)set.open=true;
  document.getElementById("evName").focus();
}
function fillEventInputs(){
  const e=ev();
  document.getElementById("evName").value=e.name;
  document.getElementById("evStart").value=e.start;
  document.getElementById("evEnd").value=e.end;
}

/* ---------- rendering ---------- */
function roleText(c){
  if(c.pt)return "R"+String(c.roster).padStart(2,"0")+" · PT "+(c.pt==="ptE"?"early":"late");
  if(c.soloE)return "R"+c.srcRoster+" · solo earlies";
  return c.role;
}
function candHTML(c,friend,day){
  const nm=`<span class="cname">${c.name}<span class="role">${roleText(c)}</span></span>`;
  if(c.lock){
    const lbl=c.lock==="group"?"nel gruppo ✈":"solo lates";
    return `<div class="cand locked">${nm}<span class="cact"><span class="state lock">${lbl}</span></span></div>`;
  }
  const ds=`data-r="${c.roster}" data-n="${c.name}" data-f="${friend.name}" data-d="${day}"`;
  if(!c.dec){
    return `<div class="cand">${nm}<span class="cact">
      <button class="mini pend" data-act="pending" ${ds} title="chiesto, in attesa">⏳</button>
      <button class="mini ok" data-act="secure" ${ds} title="approved">✓</button>
      <button class="mini no" data-act="decline" ${ds} title="ha detto no">✕</button>
    </span></div>`;
  }
  if(c.dec.status==="secured"){
    const lbl="✓ "+(c.dec.by||"?");
    return `<div class="cand resolved secured">${nm}<span class="cact"><span class="state secured">${lbl}</span>
      <button class="mini undo" data-act="undo" ${ds}>↩</button></span></div>`;
  }
  if(c.dec.status==="declined"){
    return `<div class="cand resolved declined">${nm}<span class="cact"><span class="state declined">✕ no</span>
      <button class="mini undo" data-act="undo" ${ds}>↩</button></span></div>`;
  }
  return ""; /* pending: vive nel resoconto */
}
function poolsHTML(w,day,shared){
  function filterMode(all){
    if(state.ui.cand==="active")return all.filter(c=>c.lock||!c.dec);
    if(state.ui.cand==="only")return all.filter(c=>c.dec&&c.dec.status!=="pending");
    return all;
  }
  let h=w.partners.map(r=>{
    const sh=shared.has(r);
    const cs=filterMode(candidates(w.f,[r],w.st.type,day));
    const rows=cs.length?cs.map(c=>candHTML(c,w.f,day)).join(""):`<div class="nonecand">${state.ui.cand==="only"?"nessun escluso":"nessun nominativo disponibile"}</div>`;
    return `<div class="pool ${sh?'shared':''}">
      <div class="ptop"><span class="rbadge ${sh?'shared':''}">R ${String(r).padStart(2,"0")}</span>${sh?'<span class="ptag">conteso</span>':''}</div>
      ${rows}</div>`;
  }).join("");
  const pts=filterMode(ptCandidates(w.st.type,day));
  if(pts.length){
    h+=`<div class="pool ptpool">
      <div class="ptop"><span class="rbadge ptb">PT</span><span class="ptag t">part-time liberi</span></div>
      ${pts.map(c=>candHTML(c,w.f,day)).join("")}</div>`;
  }
  return h;
}
function workerEntryHTML(w,d,shared){
  const pend=pendingSwapsFor(w.f.name,d);
  const av=availableCount(w.f,w.partners,w.st.type,d);
  let h=`<div class="whead"><span class="who">${w.f.name||w.f.code}</span>
    <span class="pill ${w.st.type}">${w.st.type==='early'?'EARLY':'LATE'} G${w.st.day}</span>`;
  if(pend.length)h+=`<span class="pill pendp">⏳ ${pend.map(p=>p.name).join(", ")}</span>`;
  else if(av===0)h+=`<span class="pill warn">nessuno disponibile</span>`;
  h+=`</div>`;
  h+=poolsHTML(w,d,shared);
  h+=`<div class="cover">Oppure:
    <button class="mini alx" data-lact="AL" data-fi="${w.idx}" data-d="${d}">A/L</button>
    <button class="mini vtox" data-lact="VTO" data-fi="${w.idx}" data-d="${d}">VTO</button>
    <button class="mini skipx" data-lact="SKIP" data-fi="${w.idx}" data-d="${d}">Non serve</button></div>`;
  return h;
}

/* ---------- resoconto ---------- */
function doneItems(){
  const done=[];
  eventDays().forEach(d=>{
    state.friends.forEach((f,idx)=>{
      if(!f.roster)return;
      const st=statusFor(f,d);
      if(st.type==="leave"){done.push({kind:"leave",f,idx,d,k:st.kind});return;}
      if(!isWork(st))return;
      const sw=securedSwapFor(f.name,d);
      if(sw)done.push({kind:"swap",f,idx,d,sw});
    });
  });
  return done;
}
function pendingItems(){
  const out=[];
  for(const k in decisions){
    const v=decisions[k];
    if(v.status!=="pending")continue;
    const pk=parseDKey(k);
    out.push({roster:pk.roster,name:pk.name,by:v.by||"?",d:pk.day});
  }
  out.sort((a,b)=>a.d<b.d?-1:a.d>b.d?1:0);
  return out;
}
function renderRecap(){
  const done=doneItems(),pend=pendingItems();
  const box=document.getElementById("recap");
  if(!done.length&&!pend.length){box.style.display="none";box.innerHTML="";return;}
  box.style.display="block";
  box.style.borderLeftColor=pend.length?"var(--amber)":"var(--green)";
  const map={AL:["al","A/L"],VTO:["vto","VTO"],SKIP:["skip","NON SERVE"]};
  const cnt=[pend.length?pend.length+" in attesa":"",done.length?done.length+" presi":""].filter(Boolean).join(" · ");
  let h=`<div class="rtitle">Resoconto <span class="rcount">${cnt}</span></div>`;
  h+=pend.map(it=>`<div class="ritem pend"><span><b>${it.by}</b> → <span class="rwait">⏳ ${it.name}</span><span class="rmeta"> R${String(it.roster).padStart(2,"0")}${it.d?(" · "+weekday(it.d)+" "+pretty(it.d)):""}</span></span>
    <span class="cact"><button class="mini ok" data-ract="confirm" data-r="${it.roster}" data-n="${it.name}" data-d="${it.d}">✓</button>
    <button class="mini no" data-ract="reject" data-r="${it.roster}" data-n="${it.name}" data-d="${it.d}">✕</button></span></div>`).join("");
  h+=done.map(it=>{
    if(it.kind==="swap")return `<div class="ritem"><span><b>${it.f.name}</b> · ${weekday(it.d)} ${pretty(it.d)} → <span class="rswap">${it.sw.name}</span> <span class="rmeta">R${String(it.sw.roster).padStart(2,"0")}</span></span>
      <button class="mini undo" data-ract="undoswap" data-r="${it.sw.roster}" data-n="${it.sw.name}" data-d="${it.d}">↩</button></div>`;
    const pair=map[it.k]||["skip",it.k];
    return `<div class="ritem"><span><b>${it.f.name}</b> · ${weekday(it.d)} ${pretty(it.d)} → <span class="rpill ${pair[0]}">${pair[1]}</span></span>
      <button class="mini undo" data-ract="undoleave" data-fi="${it.idx}" data-d="${it.d}">↩</button></div>`;
  }).join("");
  box.innerHTML=h;
  box.querySelectorAll("[data-ract]").forEach(b=>b.onclick=()=>{
    const a=b.dataset.ract;
    if(a==="confirm"){const k=dKey(+b.dataset.r,b.dataset.n,b.dataset.d),old=decisions[k]||{};setDecision(+b.dataset.r,b.dataset.n,b.dataset.d,{status:"secured",by:old.by,day:b.dataset.d});}
    else if(a==="reject")setDecision(+b.dataset.r,b.dataset.n,b.dataset.d,null); /* ha detto no: torna disponibile quel giorno */
    else if(a==="undoswap")setDecision(+b.dataset.r,b.dataset.n,b.dataset.d,null);
    else setLeave(state.friends[+b.dataset.fi],b.dataset.d,null);
  });
}

/* ---------- piano ---------- */
function renderPlan(){
  const e=ev();
  document.getElementById("evLabel").textContent=e.name+" — "+pretty(e.start)+" → "+pretty(e.end);
  renderRecap();
  const box=document.getElementById("plan");
  let days=eventDays();
  if(!days.length){box.innerHTML='<div class="day"><div class="dbody free">Imposta date valide nelle impostazioni.</div></div>';return;}
  if(state.ui.day!=="all")days=days.filter(d=>d===state.ui.day);
  const personF=state.ui.person==="all"?null:+state.ui.person;

  if(state.ui.view==="day"){
    box.innerHTML="";
    days.forEach(d=>{
      const shared=sharedRosters(d);
      let ws=workersOn(d);
      if(personF!==null)ws=ws.filter(w=>w.idx===personF);
      const unres=ws.filter(w=>isWork(w.st)&&!securedSwapFor(w.f.name,d));
      const el=document.createElement("div");el.className="day";
      el.innerHTML=`<div class="dhead"><span class="dt"><small>${weekday(d)}</small>${pretty(d)}</span>
        <span class="tag ${unres.length?'todo':'done'}">${unres.length?unres.length+" da fare":"fatto"}</span></div>`;
      const body=document.createElement("div");body.className="dbody";
      unres.forEach(w=>{const wr=document.createElement("div");wr.className="worker";wr.innerHTML=workerEntryHTML(w,d,shared);body.appendChild(wr);});
      if(!unres.length)body.insertAdjacentHTML("beforeend",`<div class="free">✓ niente da fare — vedi "Resoconto" in alto</div>`);
      if(shared.size&&unres.length>1)
        body.insertAdjacentHTML("beforeend",`<div class="clashnote">⚠ Coordinatevi: roster ${[...shared].sort((a,b)=>a-b).join(", ")} servono a più di una di voi.</div>`);
      el.appendChild(body);box.appendChild(el);
    });
  } else {
    box.innerHTML="";
    state.friends.forEach((f,idx)=>{
      if(!f.roster)return;
      if(personF!==null&&idx!==personF)return;
      const el=document.createElement("div");el.className="day";
      el.innerHTML=`<div class="dhead"><span class="dt">${f.name||f.code}</span><span class="tag done">R ${String(f.roster).padStart(2,"0")}</span></div>`;
      const body=document.createElement("div");body.className="dbody";
      let shown=0;
      days.forEach(d=>{
        const st=statusFor(f,d);
        if(!isWork(st))return;
        if(securedSwapFor(f.name,d))return;
        shown++;
        const shared=sharedRosters(d);
        const wr=document.createElement("div");wr.className="worker";
        const inner=workerEntryHTML({f,idx,st,partners:partnersFor(f.roster,st)},d,shared)
          .replace(`<span class="who">${f.name||f.code}</span>`,`<span class="who" style="font-size:14px">${weekday(d)} ${pretty(d)}</span>`);
        wr.innerHTML=inner;
        body.appendChild(wr);
      });
      if(!shown)body.insertAdjacentHTML("beforeend",'<div class="free">✓ niente da fare</div>');
      el.appendChild(body);box.appendChild(el);
    });
  }
  if(!box.innerHTML)box.innerHTML='<div class="day"><div class="dbody free">Niente da mostrare con questi filtri.</div></div>';

  box.querySelectorAll(".mini").forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.lact){const f=state.friends[+b.dataset.fi];setLeave(f,b.dataset.d,b.dataset.lact==="none"?null:b.dataset.lact);return;}
      const r=+b.dataset.r,n=b.dataset.n,d=b.dataset.d,act=b.dataset.act;
      if(act==="pending")setDecision(r,n,d,{status:"pending",by:b.dataset.f,day:d});
      else if(act==="secure")setDecision(r,n,d,{status:"secured",by:b.dataset.f,day:d});
      else if(act==="decline")setDecision(r,n,d,{status:"declined",by:b.dataset.f,day:d});
      else setDecision(r,n,d,null);
    };
  });
}

/* ---------- impostazioni ---------- */
function renderFriends(){
  const box=document.getElementById("friends");box.innerHTML="";
  state.friends.forEach((f,i)=>{
    const row=document.createElement("div");row.className="frow";
    row.innerHTML=`<span class="c"><input type="text" value="${f.code||''}" placeholder="CODICE" data-i="${i}" data-k="code"></span>
      <span class="n"><input type="text" value="${f.name||''}" placeholder="Nome" data-i="${i}" data-k="name"></span>
      <span class="r"><input type="number" min="1" max="16" value="${f.roster||''}" placeholder="R" data-i="${i}" data-k="roster"></span>
      <button class="btn btn-danger" data-del="${i}">✕</button>`;
    box.appendChild(row);
  });
  box.querySelectorAll("input").forEach(inp=>inp.oninput=e=>{
    const i=+e.target.dataset.i,k=e.target.dataset.k;
    state.friends[i][k]=k==="roster"?(parseInt(e.target.value)||""):e.target.value;
    saveState();renderFilters();renderPlan();renderCalib();
  });
  box.querySelectorAll("[data-del]").forEach(b=>b.onclick=e=>{state.friends.splice(+e.target.dataset.del,1);saveState();renderFriends();renderFilters();renderPlan();});
}
function renderCalib(){
  const ref=state.friends[0]||{name:"R"+ANCHOR_ROSTER,roster:ANCHOR_ROSTER};
  const r=ref.roster||ANCHOR_ROSTER,d=ev().start,st=statusOf(phaseOf(r,d));
  document.getElementById("calibRead").innerHTML=st.type==="off"?`<b>${ref.name}</b> · ${pretty(d)} → OFF`:`<b>${ref.name}</b> · ${pretty(d)} → ${st.type==='early'?'EARLY':'LATE'} G${st.day}`;
}
function renderSwapTables(){
  const wrap=document.getElementById("swapTables");
  function tbl(title,fn){
    let h=`<div class="cond" style="font-weight:700;font-size:13px;margin-top:10px;color:var(--night)">${title}</div><table class="swap"><tr><th>R</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th>G5</th></tr>`;
    for(let R=1;R<=16;R++){h+=`<tr><td class="r">${R}</td>`;for(let d=1;d<=5;d++)h+=`<td>${fn(R,d).join(" · ")}</td>`;h+="</tr>";}
    return h+"</table>";
  }
  wrap.innerHTML=tbl("Early — puoi chiedere a:",(R,d)=>partnersFor(R,{type:"early",day:d}))+tbl("Late — puoi chiedere a:",(R,d)=>partnersFor(R,{type:"late",day:d}));
}

/* ---------- init ---------- */
function init(){
  loadState();loadDec();
  fillEventInputs();
  document.getElementById("evName").oninput=e=>{ev().name=e.target.value;saveState();renderFilters();renderPlan();};
  document.getElementById("evStart").onchange=e=>{ev().start=e.target.value;saveState();renderFilters();renderPlan();renderCalib();};
  document.getElementById("evEnd").onchange=e=>{ev().end=e.target.value;saveState();renderFilters();renderPlan();renderCalib();};
  document.getElementById("addEvent").onclick=addNewEvent;
  document.getElementById("clearEvent").onclick=()=>{
    if(!confirm("Azzerare tutte le scelte (presi, no, attese, ferie) di questo evento per tutte?"))return;
    decisions={};leaves={};saveDec();clearEventRemote();renderPlan();
  };
  document.getElementById("delEvent").onclick=()=>{
    if(state.events.length<=1){alert("È l'unico evento: usa 'Azzera scelte' per ripulirlo.");return;}
    if(!confirm("Eliminare questo evento e le sue scelte?"))return;
    const id=state.cur;
    state.events=state.events.filter(x=>x.id!==id);
    try{localStorage.removeItem("swapplanner.dec7."+id);}catch(e){}
    if(sbReady)sb.from("swap_decisions").delete().eq("event",id);
    switchEvent(state.events[0].id);
  };
  document.getElementById("addFriend").onclick=()=>{state.friends.push({code:"",name:"",roster:""});saveState();renderFriends();renderFilters();renderPlan();};
  document.getElementById("flipParity").onclick=()=>{state.parityEarly=!state.parityEarly;saveState();renderPlan();renderCalib();};
  renderFriends();renderCalib();renderSwapTables();renderFilters();renderPlan();
  initSupabase();
}
init();
</script>
